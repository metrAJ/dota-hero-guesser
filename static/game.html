<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota Guesser</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="view active" id="game-view">
        <div class="game-header" style="display: flex; justify-content: space-between; align-items: center;">
            <button class="btn btn-tonal" onclick="goHome()">
                <span class="material-icon">arrow_back</span> Main page
            </button>
            
            <div id="attempts-display" style="font-size: 18px; font-weight: bold; color: #ffeb3b; background: rgba(0,0,0,0.3); padding: 8px 16px; border-radius: 20px;">
                Attempts: 0
            </div>
        </div>

        <div id="game-message" style="color: var(--md-sys-color-primary); margin-bottom: 16px; font-weight: 500;"></div>

        <div id="toast-message" class="toast">Wrong guess!</div>

        <div id="game-message" style="color: var(--md-sys-color-primary); margin-bottom: 16px; font-weight: 500;"></div>

        <div class="game-clues">
            <div class="clue-section">
                <h3>Main items</h3>
                <div id="items" class="items-container"></div>
            </div>
            
            <div class="clue-section">
                <h3>Backpack</h3>
                <div id="backpack" class="items-container">
                    <span style="color: var(--md-sys-color-on-surface-variant); font-size: 14px;">Empty</span>
                </div>
            </div>

            <div class="clue-section">
                <h3>Hint</h3>
                <div id="hints" class="hints-text"></div>
            </div>
        </div>

        <div id="heroes" class="heroes-grid">
            <div id="group-str" class="hero-group-card">
                <h2><span class="material-icon" style="color: #ff5252;">fitness_center</span> Strenght</h2>
                <div id="strength-heroes" class="hero-list"></div>
            </div>
            <div id="group-agi" class="hero-group-card">
                <h2><span class="material-icon" style="color: #69f0ae;">speed</span> Aggility</h2>
                <div id="agility-heroes" class="hero-list"></div>
            </div>
            <div id="group-int" class="hero-group-card">
                <h2><span class="material-icon" style="color: #40c4ff;">psychology</span> Intelegent</h2>
                <div id="intelligence-heroes" class="hero-list"></div>
            </div>
            <div id="group-uni" class="hero-group-card">
                <h2><span class="material-icon" style="color: #e040fb;">all_inclusive</span> Universal</h2>
                <div id="universal-heroes" class="hero-list"></div>
            </div>
        </div>

        <div class="game-actions">
            <button id="submit" class="btn btn-primary" onclick="submitGuess()" disabled>
                <span class="material-icon">check_circle</span> Confirm
            </button>
        </div>
    </div>

    
    <div id="end-screen" class="overlay">
        <div class="end-content">
            <div id="end-icon" class="end-icon"></div>
            <h2 id="end-message"></h2>
            <div class="end-actions">
                <button class="btn btn-primary" onclick="startNewRound()">
                    <span class="material-icon">refresh</span> Next round
                </button>
                <button class="btn btn-tonal" onclick="goHome()">
                    <span class="material-icon">home</span> Main page
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
