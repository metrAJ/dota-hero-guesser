<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota Guesser - Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="view active" style="justify-content: center; align-items: center;">
        <div class="dashboard" style="width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 24px;">
            
            <div class="card user-panel" style="text-align: center;">
                <h2>Welcome to the Dota Guesser Game!</h2>
                
                <div class="stats-box" id="user-stats" style="margin: 20px 0; font-size: 16px;">
                    <div style="color: var(--md-sys-color-on-surface-variant)">Loading stats...</div>
                </div>
                
                <div style="display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 24px;">
                    <button class="btn btn-primary" onclick="window.location.href='/game'">
                        <span class="material-icon">play_arrow</span> Solo Game
                    </button>
                    
                   <button class="btn btn-primary" onclick="window.location.href='/duel'" style="background-color: #ff5252; color: white;">
                        <span class="material-icon">sports_martial_arts</span> Duel (PvP)
                    </button>
                    
                    <button class="btn btn-tonal" onclick="handleLogout()">
                        <span class="material-icon">logout</span> Exit
                    </button>
                </div>
            </div>
            
            <div class="card leaderboard-panel">
                <h2 style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <span class="material-icon" style="color: gold;">emoji_events</span> Top Players
                </h2>
                <div id="top-players" class="top-players-list" style="margin-top: 16px; text-align: center; color: var(--md-sys-color-on-surface-variant);">
                    Loading leaderboard...
                </div>
            </div>

        </div>
    </div>

     <script src="/static/js/app.js"></script>
</body>
</html>
