<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota Guesser - PvP Arena</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/duel.css">
</head>
<body>

    <div class="view active" id="queue-view" style="justify-content: center; align-items: center; text-align: center;">
        <div class="card" style="width: 100%; max-width: 400px;">
            <h2><span class="material-icon" style="color: #ff5252;">sports_martial_arts</span> Matchmaking</h2>
            <p style="color: var(--md-sys-color-on-surface-variant); margin: 20px 0;">Waiting for an opponent...</p>
            <div class="loader"></div>
            <button class="btn btn-tonal" onclick="cancelMatchmaking()" style="width: 100%;">
                <span class="material-icon">close</span> Cancel
            </button>
        </div>
    </div>

    <div class="view" id="game-view">
        <div class="arena-container">
            
            <div class="duel-sidebar">
                <h3 id="my-name-display" style="color: var(--md-sys-color-primary);">You</h3>
                <div class="wrong-guesses-container">
                    <p>Mistakes:</p>
                    <div id="p1-wrong-guesses" class="wrong-guesses-grid"></div>
                </div>
            </div>

            <div class="center-board">
                <div class="game-header" style="display: flex; justify-content: space-between; margin-bottom: 24px;">
                    <h1 style="color: #ff5252;">PvP Arena</h1>
                    <button class="btn btn-tonal" onclick="window.location.href='/'">
                        <span class="material-icon">directions_run</span> Flee
                    </button>
                </div>

                <div id="game-message" style="color: var(--md-sys-color-primary); margin-bottom: 16px; font-size: 18px; font-weight: bold;"></div>

                <div class="hero-groups">
                    <div id="group-str" class="hero-group-card">
                        <h2><span class="material-icon" style="color: #ff5252;">fitness_center</span> Strength</h2>
                        <div id="strength-heroes" class="hero-list"></div>
                    </div>
                    <div id="group-agi" class="hero-group-card">
                        <h2><span class="material-icon" style="color: #69f0ae;">speed</span> Agility</h2>
                        <div id="agility-heroes" class="hero-list"></div>
                    </div>
                    <div id="group-int" class="hero-group-card">
                        <h2><span class="material-icon" style="color: #40c4ff;">psychology</span> Intelligence</h2>
                        <div id="intelligence-heroes" class="hero-list"></div>
                    </div>
                    <div id="group-uni" class="hero-group-card">
                        <h2><span class="material-icon" style="color: #e040fb;">all_inclusive</span> Universal</h2>
                        <div id="universal-heroes" class="hero-list"></div>
                    </div>
                </div>

                <div class="game-actions">
                    <button id="submit" class="btn btn-primary" onclick="submitDuelGuess()" disabled style="background-color: #ff5252; color: white;">
                        <span class="material-icon">gavel</span> Lock In
                    </button>
                </div>
            </div>

            <div class="duel-sidebar">
                <h3 id="opponent-name-display" style="color: #ff5252;">Opponent</h3>
                <div class="wrong-guesses-container">
                    <p>Mistakes:</p>
                    <div id="p2-wrong-guesses" class="wrong-guesses-grid"></div>
                </div>
            </div>

        </div>
    </div>

    <div id="end-screen" class="overlay">
        <div class="end-content">
            <div id="end-icon" class="end-icon"></div>
            <h2 id="end-message" style="margin: 16px 0;"></h2>
            <div class="end-actions" style="display: flex; gap: 12px; justify-content: center; margin-top: 24px;">
                <button class="btn btn-primary" onclick="window.location.reload()" style="background-color: #ff5252;">
                    <span class="material-icon">refresh</span> New Duel
                </button>
                <button class="btn btn-tonal" onclick="window.location.href='/'">
                    <span class="material-icon">home</span> Dashboard
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/duel.js"></script>
</body>
</html>
